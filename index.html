<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMTPC.Tool Repository</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a {
            display: block;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        a:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .download-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚀</div>
        <h1>GMTPC.Tool</h1>
        <p class="subtitle">Repository Access Portal</p>
        <div class="links">
            <a href="https://github.com/ghostminhtoan/GMTPC.Tool" target="_blank">📁 GitHub Repository</a>
            <a href="https://github.com/ghostminhtoan/GMTPC.Tool/releases" target="_blank">📦 Releases & Downloads</a>
            <a href="https://github.com/ghostminhtoan/GMTPC.Tool/issues" target="_blank">🐛 Issues & Bug Reports</a>
            <a href="https://github.com/ghostminhtoan/GMTPC.Tool/pulls" target="_blank">🔀 Pull Requests</a>
            <a href="GMTPC.Tool.exe" class="download-btn">⬇️ Download Latest EXE</a>
        </div>
    </div>
</body>
</html>
